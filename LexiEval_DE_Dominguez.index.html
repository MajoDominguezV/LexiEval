function LangSelector({activeLangs,setActiveLangs}){
  const toggle=c=>{
    const next=activeLangs.includes(c)
      ?(activeLangs.length>1?activeLangs.filter(x=>x!==c):activeLangs)
      :[...activeLangs,c];
    setActiveLangs(next);
  };
  return h("div",{className:"lang-sel-box"},
    h("p",{className:"alabel",style:{margin:"0 0 5px"}},"Sprachen auswählen"),
    h("p",{style:{fontSize:"11px",color:"#aaa",margin:"0 0 8px"}},"Aktive Sprachen (blau) werden bewertet. Anklicken zum Hinzufügen oder Entfernen."),
    h("div",{className:"lang-toggle-row"},
      TLANGS.map(l=>{
        const isOn=activeLangs.includes(l.c);
        return h("button",{
          key:l.c,
          className:"ltog"+(isOn?" on":""),
          onClick:()=>toggle(l.c),
          disabled:isOn&&activeLangs.length===1
        },isOn?"✓ "+l.n:l.n);
      })
    )
  );
}

      h("div",{className:"word-hero"},
        data.art!=="—"&&h("span",{className:"art"},data.art),
        h("span",{className:"wbig"},word),
        data.pl&&h("span",{className:"plural-info"},data.pl),
        h("span",{className:"synset"},data.s),
        h("span",{className:"pos-b"},data.pos)
      ),
      h("p",{className:"def-en"},data.def_en),
      h("p",{className:"def-de"},data.def_de),
      data.hi?.length>0&&h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"4px"}},
        h("span",{style:{fontSize:"12px",color:"#bbb",marginRight:"4px"}},"↑"),
        data.hi.map(x=>h("span",{key:x,className:"hpill"},x))
      )
    ),
    h("div",{className:"card"},
      h("p",{className:"sec"},"Mehrsprachige Äquivalente"),
      TLANGS.map(l=>{
        const lems=(data.eq||{})[l.c]||[];
        return h("div",{className:"lang-row",key:l.c},
          h("div",{className:"lcode"},l.c.toUpperCase()),
          h("div",{style:{flex:1}},
            h("div",{className:"lname"},l.n),
            lems.length>0?h("div",{dir:l.c==="ar"?"rtl":"ltr"},...lems.map((m,i)=>h(React.Fragment,{key:i},i>0&&h("span",{className:"lsep"},"·"),h("span",{className:"lemma"+(l.c==="ar"?" rtl-text":"")},m)))):h("span",{className:"gap-m"},"∅ lexikalische Lücke")
          )
        );
      })
    ),
    data.ej?.length>0&&h("div",{className:"card"},
      h("p",{className:"sec"},"Verwendungsbeispiele"),
      h("ul",{style:{margin:0,paddingLeft:"1.2rem",fontSize:"13px",color:"#666",lineHeight:"2.1"}},data.ej.map((e,i)=>h("li",{key:i},e)))
    ),
    h("div",{style:{display:"flex",gap:"8px",paddingBottom:"1rem",flexWrap:"wrap"}},
      h("button",{className:"bp",onClick:onStartEval},"Bewertung starten →"),
      h("button",{className:"bs",onClick:onAllCorrect},"✓ Alles korrekt — speichern")
    )
  );
}

function EvalView({word,data,ev,setEv,activeLangs,setActiveLangs,onSubmit,onBack}){
  const [tipInfo,setTipInfo]=useState({lc:null,p:null});

  const upd=(k,f,v)=>setEv(p=>({...p,[k]:{...p[k],[f]:v}}));

  const handleLangChange=newLangs=>{
    setActiveLangs(newLangs);
    setEv(prev=>{
      const next={...prev};
      newLangs.forEach(l=>{if(!next[l])next[l]={r:null,c:"",pts:[]};});
      return next;
    });
  };

  const toggleLangP=(lc,p)=>{
    setTipInfo(t=>(t.lc===lc&&t.p===p)?{lc:null,p:null}:{lc,p});
    setEv(prev=>{
      const cur=(prev[lc]?.pts||[]);
      return {...prev,[lc]:{...prev[lc],pts:cur.includes(p)?cur.filter(x=>x!==p):[...cur,p]}};
    });
  };

  const RR=({val,onChange,opts})=>h("div",{className:"rbrow"},opts.map(o=>h("button",{key:o.v,className:"rb"+(val===o.v?" "+o.v:""),onClick:()=>onChange(o.v)},o.l)));
  const defOpts=[{v:"ok",l:"✓ Korrekt"},{v:"dud",l:"⚠ Teilweise"},{v:"mal",l:"✗ Falsch"}];
  const langOpts=[{v:"ok",l:"✓ Korrekt"},{v:"dud",l:"⚠ Fraglich"},{v:"mal",l:"✗ Falsch"},{v:"gap",l:"∅ Lücke"}];
  const needsProbs=r=>r==="dud"||r==="mal"||r==="gap";

  return h("div",null,
    h("div",{className:"card"},
      h("div",{className:"word-hero"},data.art!=="—"&&h("span",{className:"art"},data.art),h("span",{className:"wbig"},word),h("span",{className:"synset"},data.s),h("span",{className:"pos-b"},data.pos)),
      h("p",{className:"def-en"},data.def_en)
    ),
    h(LangSelector,{activeLangs,setActiveLangs:handleLangChange}),
    h("div",{className:"card"},
      h("p",{className:"sec"},"Schritt 1 — Äquivalente bewerten"),
      activeLangs.map(lc=>{
        const li=TLANGS.find(l=>l.c===lc);
        const lems=(data.eq||{})[lc]||[];
        const e=ev[lc]||{r:null,c:"",pts:[]};
        return h("div",{className:"lang-row",key:lc},
          h("div",{className:"lcode"},lc.toUpperCase()),
          h("div",{style:{flex:1}},
            h("div",{className:"lname"},li?.n),
            lems.length>0
              ?h("div",null,...lems.map((m,i)=>h(React.Fragment,{key:i},i>0&&h("span",{className:"lsep"},"·"),h("span",{className:"lemma"},m))))
              :h("span",{className:"gap-m"},"∅ kein Äquivalent verzeichnet"),
            h(RR,{val:e.r,onChange:v=>upd(lc,"r",v),opts:langOpts}),
            needsProbs(e.r)&&h("div",{style:{marginTop:"8px"}},
              h("p",{style:{fontSize:"11px",color:"#888",margin:"0 0 5px",letterSpacing:".04em"}},"Welcher Problemtyp? (anklicken für Erklärung)"),
              h("div",{style:{display:"flex",gap:"5px",flexWrap:"wrap"}},
                ISSUETYPES.map(p=>h("button",{key:p,
                  className:"ibu"+((e.pts||[]).includes(p)?" sel":""),
                  onClick:()=>toggleLangP(lc,p)
                },p))
              ),
              tipInfo.lc===lc&&tipInfo.p&&h("div",{style:{
                marginTop:"7px",padding:"9px 11px",background:"#f0f9ff",
                border:"1px solid #bae6fd",borderRadius:"7px",
                fontSize:"12px",color:"#0369a1",lineHeight:"1.65"
              }},
                h("strong",{style:{display:"block",marginBottom:"3px",fontSize:"12px"}},tipInfo.p),
                TIPODESC[tipInfo.p]||""
              )
            ),
            h("textarea",{className:"cmt",rows:2,placeholder:"Anmerkung (optional)…",value:e.c||"",onChange:ev2=>upd(lc,"c",ev2.target.value)})
          )
        );
      })
    ),
    h("div",{className:"two-col"},
      h("div",{className:"card"},
        h("p",{className:"sec"},"Schritt 2 — Definitionsqualität"),
        h("p",{style:{fontSize:"13px",color:"#666",fontStyle:"italic",margin:"0 0 8px"}},data.def_en),
        h(RR,{val:ev._de?.r,onChange:v=>upd("_de","r",v),opts:defOpts}),
        h("textarea",{className:"cmt",rows:2,placeholder:"Was fehlt oder stimmt nicht?",value:ev._de?.c||"",onChange:e=>upd("_de","c",e.target.value)})
      ),
      h("div",{className:"card"},
        h("p",{className:"sec"},"Schritt 3 — Beispielsätze"),
        h("ul",{style:{margin:"0 0 8px",paddingLeft:"1.2rem",fontSize:"12px",color:"#666",lineHeight:"2"}},(data.ej||[]).map((e,i)=>h("li",{key:i},e))),
        h(RR,{val:ev._ej?.r,onChange:v=>upd("_ej","r",v),opts:[{v:"ok",l:"✓ Adäquat"},{v:"dud",l:"⚠ Wenige"},{v:"mal",l:"✗ Fehlend"}]}),
        h("textarea",{className:"cmt",rows:2,placeholder:"Fehlen wichtige Kontexte?",value:ev._ej?.c||"",onChange:e=>upd("_ej","c",e.target.value)})
      )
    ),
    h("div",{className:"card"},
      h("p",{className:"sec"},"Freie Anmerkungen"),
      h("textarea",{className:"cmt",rows:3,placeholder:"Weitere Beobachtungen zu Übersetzung oder Lexikografie…",value:ev._obs||"",onChange:e=>setEv(p=>({...p,_obs:e.target.value}))})
    ),
    h("div",{style:{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap",paddingBottom:"1rem"}},
      h("button",{className:"bp",onClick:onSubmit},"Auswertung anzeigen →"),
      h("button",{className:"bs",onClick:onBack},"← Zurück")
    )
  );
}

function FeedbackView({word,data,ev,feedback,activeLangs,student,onSave,saved,onReset,onBack}){
  const{score,hits,misses,fps}=feedback;
  const col=sCol(score);
  const langLabels=activeLangs.map(c=>TLANGS.find(l=>l.c===c)?.n||c).join(", ");
  const [missEval,setMissEval]=useState({});
  const setME=(i,field,val)=>setMissEval(p=>({...p,[i]:{...p[i],[field]:val}}));

  return h("div",null,
    h("div",{className:"card"},
      h("p",{className:"sec"},"Auswertung — "+(data.art!=="—"?data.art+" ":"")+word+(student?" · "+student:"")),
      h("p",{style:{fontSize:"12px",color:"#aaa",margin:"0 0 12px"}},"Bewertete Sprachen: "+langLabels),
      h("div",{className:"score-row"},
        h("div",null,h("p",{className:"sn",style:{color:col}},score),h("p",{style:{fontSize:"13px",color:"#888",margin:"2px 0 0"}},"/10 Punkte")),
        h("p",{style:{flex:1,fontSize:"14px",lineHeight:"1.7",margin:0,color:"#666"}},data.n)
      )
    ),
    hits.length>0&&h("div",{className:"card"},
      h("p",{className:"sec"},"Richtig erkannte Probleme ("+hits.length+")"),
      hits.map(({prob},i)=>h("div",{className:"fb-row",key:i},
        h("div",{className:"dot",style:{background:"#f0fdf4",borderColor:"#86efac"}}),
        h("div",{style:{flex:1}},h("strong",null,TIPOLABEL[prob.t]||prob.t),h("span",{style:{color:"#888"}}," · "+prob.l.join(", ")),h("p",{style:{margin:"3px 0 0",fontSize:"13px",color:"#666"}},prob.d))
      ))
    ),
    misses.length>0&&h("div",{className:"card"},
      h("p",{className:"sec"},"Nicht erkannte Probleme ("+misses.length+") — bitte selbst bewerten"),
      h("p",{style:{fontSize:"12px",color:"#888",margin:"0 0 12px",fontStyle:"italic"}},"Diese Probleme wurden von der KI vorgeschlagen. Stimmen Sie zu? Die KI kann sich auch irren."),
      misses.map((prob,i)=>{
        const me=missEval[i]||{};
        return h("div",{className:"prc",key:i,style:{marginBottom:"10px"}},
          h("p",{className:"prt"},(TIPOLABEL[prob.t]||prob.t)+" · Schweregrad: "+prob.g+" · Sprachen: "+prob.l.join(", ")),
          h("p",{className:"prd"},prob.d),
          h("div",{className:"miss-eval"},
            h("span",{style:{fontSize:"11px",color:"#888",alignSelf:"center",marginRight:"4px"}},"Ihre Einschätzung:"),
            h("button",{className:"meb"+(me.v==="yes"?" yes":""),onClick:()=>setME(i,"v","yes")},"✓ Stimme zu"),
            h("button",{className:"meb"+(me.v==="part"?" part":""),onClick:()=>setME(i,"v","part")},"⚠ Teilweise"),
            h("button",{className:"meb"+(me.v==="no"?" no":""),onClick:()=>setME(i,"v","no")},"✗ Nicht einverstanden")
          ),
          me.v&&h("textarea",{
            className:"cmt",rows:2,
            placeholder:me.v==="no"?"Warum nicht? Was würden Sie stattdessen sagen?":me.v==="part"?"Was stimmt, was nicht?":"Optional: Anmerkung…",
            value:me.c||"",
            onChange:e=>setME(i,"c",e.target.value)
          }),
          me.v==="no"&&h("p",{className:"miss-note"},"Ihr Widerspruch wird beim Speichern mitexportiert — wertvoll für die Verbesserung der Einträge.")
        );
      })
    ),
    fps.length>0&&h("div",{className:"card"},
      h("p",{className:"sec"},"Falsch markiert"),
      fps.map((l,i)=>h("div",{className:"fb-row",key:i},
        h("div",{className:"dot",style:{background:"#fef2f2",borderColor:"#fca5a5"}}),
        h("span",null,"'"+l.toUpperCase()+"' als problematisch markiert — für '"+word+"' ist kein gravierendes Problem in dieser Sprache dokumentiert.")
      ))
    ),
    h("div",{className:"card"},
      h("p",{className:"sec"},"Eigene Bewertungen"),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:"8px"}},
        activeLangs.map(lc=>{
          const e=ev[lc];if(!e?.r)return null;
          const li=TLANGS.find(l=>l.c===lc);
          const colors={ok:"#16a34a",dud:"#d97706",mal:"#dc2626",gap:"#d97706"};
          const labels={ok:"Korrekt",dud:"Fraglich",mal:"Falsch",gap:"Lücke"};
          return h("div",{key:lc,style:{border:"1px solid #e8e5de",borderRadius:"8px",padding:"8px 10px"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}},
              h("span",{style:{fontSize:"11px",fontWeight:600,color:"#888"}},lc.toUpperCase()+" — "+li?.n),
              h("span",{style:{fontSize:"11px",fontWeight:600,color:colors[e.r]}},labels[e.r]||e.r)
            ),
            e.pts?.length>0&&h("div",{style:{display:"flex",gap:"4px",flexWrap:"wrap",margin:"4px 0"}},
              e.pts.map(p=>h("span",{key:p,style:{fontSize:"10px",padding:"2px 7px",background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:"10px",color:"#d97706"}},p))
            ),
            e.c&&h("p",{style:{fontSize:"12px",color:"#666",margin:"4px 0 0",fontStyle:"italic"}},e.c)
          );
        })
      ),
      ev._obs&&h("p",{style:{marginTop:"10px",padding:"8px 10px",background:"#f9f8f5",borderRadius:"8px",fontSize:"13px",color:"#666",fontStyle:"italic",margin:"10px 0 0"}},ev._obs)
    ),
    h("div",{style:{display:"flex",gap:"8px",paddingBottom:"1rem",flexWrap:"wrap",alignItems:"center"}},
      h("button",{className:"bp",onClick:onReset},"Neues Wort"),
      h("button",{className:"bs",onClick:onBack},"← Überarbeiten"),
      saved?h("span",{className:"save-notice"},"✓ Gespeichert")
           :h("button",{className:"bx",onClick:()=>onSave(missEval)},"Auswertung speichern →")
    )
  );
}

function App(){
  const [ltab,setLtab]=useState("lemma");
  const [sel,setSel]=useState(null);
  const [phase,setPhase]=useState("view");
  const [ev,setEv]=useState({});
  const [activeLangs,setActiveLangs]=useState([]);
  const [student,setStudent]=useState(()=>{try{return localStorage.getItem("lexieval_student")||"";}catch(e){return "";}});
  const [fb,setFb]=useState(null);
  const [saved,setSaved]=useState(false);
  const [viewResult,setViewResult]=useState(null);
  const [vRefresh,setVRefresh]=useState(0);
  const [quickSaved,setQuickSaved]=useState(false);

  const saveStudent=v=>{setStudent(v);try{localStorage.setItem("lexieval_student",v);}catch(e){}};

  const handleSel=w=>{setSel(w);setPhase("view");setEv({});setFb(null);setSaved(false);setViewResult(null);setQuickSaved(false);setActiveLangs([]);};

  const startEval=()=>{
    const langs=activeLangs.length>0?activeLangs:TLANGS.map(l=>l.c);
    const init={};
    langs.forEach(l=>{init[l]={r:null,c:"",pts:[]};});
    init._de={r:null,c:""};init._ej={r:null,c:""};init._obs="";
    setActiveLangs(langs);
    setEv(init);setPhase("eval");
  };

  const handleAllCorrect=()=>{
    const langs=activeLangs.length>0?activeLangs:TLANGS.map(l=>l.c);
    const mockEv={};
    langs.forEach(l=>{mockEv[l]={r:"ok",c:"",pts:[]};});
    mockEv._de={r:"ok",c:""};mockEv._ej={r:"ok",c:""};mockEv._obs="";
    const mockFb=computeFeedback(WD[sel],mockEv,langs);
    saveResult({id:Date.now().toString(),ts:new Date().toISOString(),student:student.trim()||null,word:sel,score:mockFb.score,activeLangs:langs,ev:mockEv,hits:mockFb.hits,misses:mockFb.misses,fps:mockFb.fps});
    setQuickSaved(true);setVRefresh(v=>v+1);
  };

  const submit=()=>{setFb(computeFeedback(WD[sel],ev,activeLangs));setPhase("feedback");setSaved(false);};

  const handleSave=(missEval)=>{
    saveResult({id:Date.now().toString(),ts:new Date().toISOString(),student:student.trim()||null,word:sel,score:fb.score,activeLangs,ev,hits:fb.hits,misses:fb.misses,fps:fb.fps,missEval:missEval||{}});
    setSaved(true);setVRefresh(v=>v+1);
  };

  const handleViewResult=r=>{setViewResult(r);setLtab("verlauf");};
  const data=sel?WD[sel]:null;

  const nameBar=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"10px 1.25rem 0"}},
    h("label",{style:{fontSize:"11px",color:"#888",whiteSpace:"nowrap",letterSpacing:".04em",textTransform:"uppercase",fontWeight:600}},"Dein Name:"),
    h("input",{type:"text",placeholder:"Vorname Nachname (wird gespeichert)",value:student,onChange:e=>saveStudent(e.target.value),
      style:{flex:1,maxWidth:"260px",padding:"5px 9px",fontSize:"13px",border:"1px solid #ddd",borderRadius:"7px",fontFamily:"inherit",background:"#fff",color:"#111"}})
  );

  return h("div",{id:"wrap"},
    h("div",{id:"lp"},
      h("div",{id:"tabs"},
        h("button",{className:"tab"+(ltab==="lemma"?" on":""),onClick:()=>setLtab("lemma")},"Lemmata"),
        h("button",{className:"tab"+(ltab==="esmas"?" on":""),onClick:()=>setLtab("esmas")},"ESMAS-Konzepte"),
        h("button",{className:"tab"+(ltab==="verlauf"?" on":""),onClick:()=>setLtab("verlauf")},"Verlauf")
      ),
      h("div",{id:"lb"},
        ltab==="lemma"&&h(LemmaSearch,{onSelect:handleSel,sel}),
        ltab==="esmas"&&h(ESMASBrowser,{onSelect:handleSel,sel}),
        ltab==="verlauf"&&h(VerlaufPanel,{onView:handleViewResult,activeId:viewResult?.id,refresh:vRefresh})
      )
    ),
    h("div",{id:"rp"},
      nameBar,
      viewResult&&ltab==="verlauf"
        ?h("div",{className:"detail-panel",style:{marginTop:"1rem"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
              h("p",{className:"sec",style:{margin:0}},"Archivierte Auswertung"),
              h("button",{className:"bs",style:{padding:"4px 10px",fontSize:"12px"},onClick:()=>setViewResult(null)},"× Schließen")
            ),
            WD[viewResult.word]&&h(FeedbackView,{
              word:viewResult.word,data:WD[viewResult.word],ev:viewResult.ev,
              feedback:computeFeedback(WD[viewResult.word],viewResult.ev,viewResult.activeLangs||TLANGS.map(l=>l.c)),
              activeLangs:viewResult.activeLangs||TLANGS.map(l=>l.c),
              student:viewResult.student||"",
              onSave:()=>{},saved:true,onReset:()=>setViewResult(null),onBack:()=>setViewResult(null)
            })
          )
        :phase==="view"&&(data
            ?h("div",null,
                h(WordCard,{word:sel,data,onStartEval:startEval,onAllCorrect:handleAllCorrect}),
                quickSaved&&h("p",{style:{fontSize:"13px",color:"#16a34a",padding:"0 0 1rem",fontWeight:500}},"✓ Als korrekt gespeichert")
              )
            :h("div",{className:"info-panel",style:{marginTop:"1rem"}},
                h("p",{style:{fontFamily:"Georgia,serif",fontSize:"22px",fontWeight:400,color:"#1a2e4a",margin:"0 0 4px"}},"LexiEval DE"),
                h("p",{style:{fontSize:"13px",color:"#2563eb",margin:"0 0 16px",fontStyle:"italic"}},"Ein KI-gestütztes multilinguales Evaluationswörterbuch · Deutsch als Ausgangssprache"),
                h("p",{style:{fontSize:"13px",color:"#444",lineHeight:"1.7",margin:"0 0 14px"}},"LexiEval DE wurde entwickelt, um Studierende der Lexikografie und Übersetzungswissenschaft beim kritischen Umgang mit KI-generierten Wörterbuchdaten zu schulen. Die Einträge entstanden durch ein systematisches Mapping zwischen dem ",h("strong",null,"ESMAS-DE-Itinerario")," (ontologische Wortfeldklassifikation) und dem ",h("strong",null,"Open Multilingual WordNet")," — generiert mit ",h("strong",null,"claude.ai")," (Anthropic). Sie sind Arbeitsmaterial, kein fertiges Wörterbuch."),
                h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}},
                  h("div",{style:{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:"8px",padding:"10px 12px"}},
                    h("p",{style:{fontSize:"11px",fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",color:"#0369a1",margin:"0 0 5px"}},"Semasiologisch"),
                    h("p",{style:{fontSize:"12px",color:"#444",margin:0}},"Wort eingeben → Analysekarte mit Äquivalenten, Problemen, Bewertungsformular")
                  ),
                  h("div",{style:{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:"8px",padding:"10px 12px"}},
                    h("p",{style:{fontSize:"11px",fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",color:"#166534",margin:"0 0 5px"}},"Onomasiologisch"),
                    h("p",{style:{fontSize:"12px",color:"#444",margin:0}},"Konzept wählen (ESMAS-Welt → Route) → Wortliste → Analysekarte")
                  )
                ),
                h("p",{style:{fontSize:"11px",color:"#888",borderTop:"1px solid #e8e5de",paddingTop:"10px",lineHeight:"1.6"}},"⚠ ",h("strong",null,"Hinweis zur Datenherkunft:")," Die Synset-IDs und Äquivalente sind KI-generiert (claude.ai) — kein direkter Zugriff auf WordNet. Bitte gegen OMW verifizieren: ",h("a",{href:"https://compling.upol.cz/ntumc/cgi-bin/wn-gridx.cgi?gridmode=grid",style:{color:"#2563eb"}},"compling.upol.cz"),". Arabisch (AR) und Russisch (RU) sind für ausgewählte Einträge verfügbar (★-Wörter)."),
                h("p",{style:{fontSize:"12px",color:"#aaa",marginTop:"12px"}},"← Wort aus der Lemmatasuche oder den ESMAS-Konzepten auswählen · ★ = vollständiges Analysedossier (50 Einträge)")
              )
          ),
      !viewResult&&phase==="eval"&&data&&h(EvalView,{word:sel,data,ev,setEv,activeLangs,setActiveLangs,onSubmit:submit,onBack:()=>setPhase("view")}),
      !viewResult&&phase==="feedback"&&fb&&h(FeedbackView,{word:sel,data,ev,feedback:fb,activeLangs,student,onSave:handleSave,saved,onReset:()=>{setSel(null);setPhase("view");},onBack:()=>setPhase("eval")})
    )
  );
}

ReactDOM.render(h(App),document.getElementById("app"));
</script></html>
